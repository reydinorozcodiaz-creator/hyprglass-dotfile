# For all categories, see https://wiki.hyprland.org/Configuring/Variables/
# ‚Ėą ‚Ėą‚ĖĄ‚ĖĎ‚Ėą ‚Ėą‚ĖÄ‚Ėą ‚Ėą‚ĖĎ‚Ėą ‚ĖÄ‚Ėą‚ĖÄ
# ‚Ėą ‚Ėą‚ĖĎ‚ĖÄ‚Ėą ‚Ėą‚ĖÄ‚ĖÄ ‚Ėą‚ĖĄ‚Ėą ‚ĖĎ‚Ėą‚ĖĎ

input {
    # Keyboard
    kb_layout = latam
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    # Mouse
    follow_mouse = 2
     float_switch_override_focus = 2
    sensitivity = 0  # -1.0 - 1.0, 0 means no modification
    scroll_points = 15
    scroll_method = normal
    accel_profile = "flat"

    # Touchpad
    touchpad {
        natural_scroll = true
        scroll_factor = 0.5 
    }
}

# Example per-device config
# See https://wiki.hyprland.org/Configuring/Keywords/#per-device-input-configs for more
device {
    name = epic-mouse-v1
    sensitivity = 0.5

}


# ‚Ėą‚ĖÄ‚ĖÄ ‚Ėą‚ĖÄ‚ĖÄ ‚Ėą‚ĖÄ ‚ĖÄ‚Ėą‚ĖÄ ‚Ėą‚ĖĎ‚Ėą ‚Ėą‚ĖÄ‚Ėą ‚Ėą‚ĖÄ‚ĖÄ ‚Ėą‚ĖÄ
# ‚Ėą‚ĖĄ‚Ėą ‚Ėą‚Ėą‚ĖĄ ‚ĖĄ‚Ėą ‚ĖĎ‚Ėą‚ĖĎ ‚Ėą‚ĖĄ‚Ėą ‚Ėą‚ĖÄ‚ĖĄ ‚Ėą‚Ėą‚ĖĄ ‚ĖĄ‚Ėą

gestures {
    # Touchpad workspace swipe
    workspace_swipe_distance = 300
    workspace_swipe_invert = true
    workspace_swipe_min_speed_to_force = 30
    workspace_swipe_cancel_ratio = 0.5
    workspace_swipe_create_new = false

    # Touchpad window actions
    workspace_swipe_direction_lock = true
    workspace_swipe_direction_lock_threshold = 10

    # Touch screen
    workspace_swipe_use_r = true
}
