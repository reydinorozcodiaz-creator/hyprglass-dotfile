# Launch favorite apps

exec-once = ~/.config/hypr/scripts/tools/AleatoryWall.sh --pywal &

# Theme unification (cursor + Qt/GTK themes)
exec-once = ~/.config/hypr/scripts/system/theme-unifier.sh apply &

# Core components for system functionality
exec-once = gnome-keyring-daemon --start --components=secrets,ssh & # Authentication
exec-once = ~/.config/hypr/scripts/system/polkit-agent.sh & # Authentication agent
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP # Import environment variables
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP # Update dbus environment
exec-once = udiskie & # Automount disks
exec-once = /usr/lib/geoclue-2.0/demos/agent &
exec-once = xsettingsd &
exec-once = kbuildsycoca6 --noincremental
exec-once = wl-paste --type text --watch cliphist store &
exec-once = wl-paste --type image --watch cliphist store &

# Notification daemon
exec-once = ~/.config/hypr/scripts/start-swaync.sh &

# Idle configuration
exec-once = ~/.config/hypr/scripts/system/idle-config.sh &

# XDG Portal setup
exec-once = ~/.config/hypr/scripts/system/xdgportal.sh &

# Gestor de Energia
exec-once = cbatticon --low-level=15 --critical-level=5 --icon-type=symbolic --icon-type=notifications &

# bar
exec-once = ~/.config/hypr/scripts/start-quickshell.sh &
