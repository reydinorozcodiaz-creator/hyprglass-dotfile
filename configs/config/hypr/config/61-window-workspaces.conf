# ============================================================================
# Workspace routing rules
# ============================================================================

windowrule {
    name = Workspace 1 - Terminals
    match:class = ^(alacritty|Alacritty|gnome-terminal-server|Gnome-terminal-server|kitty|konsole|Konsole|org\.gnome\.Terminal|org\.kde\.konsole)$
    workspace = 1
}

windowrule {
    name = Workspace 2 - Development
    match:class = ^(antigravity|code|Code|code-oss|Code-oss|idea|jetbrains-clion|Jetbrains-clion|jetbrains-idea|Jetbrains-idea|org\.sublimetext\.Sublime_text|org\.visualstudio\.Code|sublime_text|Sublime_text)$
    workspace = 2
}

windowrule {
    name = Workspace 3 - Browsers
    match:class = ^(brave-browser|Brave-browser|chromium|Chromium|firefox|Firefox|google-chrome|Google-chrome|microsoft-edge|Microsoft-edge|org\.chromium\.Chromium|org\.mozilla\.firefox|zen)$
    workspace = 3
}

windowrule {
    name = Workspace 4 - Communication
    match:class = ^(discord|Discord|franz|Franz|slack|Slack|telegram-desktop|TelegramDesktop|org\.telegram\.desktop|webcord|Webcord|whatsapp-nativefier-d40211|whatsdesk)$
    workspace = 4
}

windowrule {
    name = Workspace 5 - Media and Productivity
    match:class = ^(eog|gwenview|libreoffice|LibreOffice|libreoffice-calc|LibreOffice-calc|libreoffice-impress|LibreOffice-impress|libreoffice-writer|LibreOffice-writer|mpv|obsidian|okular|onlyoffice-desktopeditors|OnlyOffice-desktopeditors|org\.kde\.gwenview|org\.libreoffice\.LibreOffice|org\.libreoffice\.libreoffice-calc|org\.libreoffice\.libreoffice-impress|org\.libreoffice\.libreoffice-writer|spotify|Spotify|vlc)$
    workspace = 5
}

windowrule {
    name = Workspace 6 - System Utilities
    match:class = ^(blueman-manager|dolphin|fdm|GParted|limo|lxappearance|nemo|nm-connection-editor|org\.gnome\.DiskUtility|org\.gnome\.nautilus|org\.gnome\.Nautilus|org\.kde\.dolphin|org\.pulseaudio\.pavucontrol|pavucontrol|qt5ct|qt6ct|thunar)$
    workspace = 6
}

windowrule {
    name = Workspace 7 - Gaming
    match:class = ^(Cemu|heroic|Heroic|lutris|Lutris|minecraft|Minecraft|minecraft-launcher|Minecraft Launcher|minetest|Minetest|net\.lutris\.Lutris|pcsx2-qt|SKlauncher.*|steam|Steam|steam_app_*|Yuzu)$
    workspace = 7
}
