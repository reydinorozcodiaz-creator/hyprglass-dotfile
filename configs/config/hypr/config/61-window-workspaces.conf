# ============================================================================
# Workspace routing rules
# ============================================================================

windowrule {
    name = Workspace 1 - Terminals
    match:class = ^(kitty|alacritty|Alacritty|gnome-terminal-server|Gnome-terminal-server|org\.gnome\.Terminal|konsole|Konsole|org\.kde\.konsole)$
    workspace = 1
}

windowrule {
    name = Workspace 2 - Development
    match:class = ^(idea|code|Code|code-oss|Code-oss|org\.visualstudio\.Code|sublime_text|Sublime_text|org\.sublimetext\.Sublime_text|jetbrains-idea|Jetbrains-idea|jetbrains-clion|Jetbrains-clion|antigravity)$
    workspace = 2
}

windowrule {
    name = Workspace 3 - Browsers
    match:class = ^(zen|firefox|Firefox|chromium|Chromium|google-chrome|Google-chrome|brave-browser|Brave-browser|org\.chromium\.Chromium|org\.mozilla\.firefox|Microsoft-edge|microsoft-edge)$
    workspace = 3
}

windowrule {
    name = Workspace 4 - Communication
    match:class = ^(TelegramDesktop|telegram-desktop|org\.telegram\.desktop|discord|Discord|webcord|Webcord|Franz|franz|whatsapp-nativefier-d40211|whatsdesk|Slack|slack)$
    workspace = 4
}

windowrule {
    name = Workspace 5 - Media and Productivity
    match:class = ^(libreoffice|LibreOffice|libreoffice-writer|LibreOffice-writer|libreoffice-calc|LibreOffice-calc|libreoffice-impress|LibreOffice-impress|org\.libreoffice\.LibreOffice|org\.libreoffice\.libreoffice-writer|org\.libreoffice\.libreoffice-calc|org\.libreoffice\.libreoffice-impress|onlyoffice-desktopeditors|OnlyOffice-desktopeditors|eog|gwenview|org\.kde\.gwenview|vlc|Spotify|spotify|mpv|okular|obsidian)$
    workspace = 5
}

windowrule {
    name = Workspace 6 - System Utilities
    match:class = ^(pavucontrol|lxappearance|qt5ct|qt6ct|org\.gnome\.DiskUtility|GParted|org\.pulseaudio\.pavucontrol|blueman-manager|nm-connection-editor|fdm|org\.kde\.dolphin|dolphin|nemo|thunar|org\.gnome\.Nautilus|org\.gnome\.nautilus|limo)$
    workspace = 6
}

windowrule {
    name = Workspace 7 - Gaming
    match:class = ^(steam|Steam|Lutris|lutris|heroic|Heroic|minetest|Minetest|minecraft-launcher|Minecraft Launcher|minecraft|Minecraft|pcsx2-qt|Yuzu|Cemu|net\.lutris\.Lutris|SKlauncher.*)$
    workspace = 7
}
