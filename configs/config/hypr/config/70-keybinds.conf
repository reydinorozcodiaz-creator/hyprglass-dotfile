# Set programs that you use
$shiftMod = SHIFT
$terminal = kitty
$fileManager = nautilus
$menu = fuzzel
$code = code
$browser = zen
$rofiUtils = $HOME/.config/hypr/rofi/scripts/utilities
$launcher = $rofiUtils/allApps
$powermenu = $rofiUtils/powermenu
$windowMenu = $rofiUtils/windows
$clipboardMenu = $rofiUtils/clipboard

# Launch applications
bind = $mainMod, Return, exec, $terminal
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, R, exec, $menu
bind = $mainMod, C, exec, $code
bind = $mainMod, B, exec, $browser

# Rofi menus (consistent Super + D chords)
bind = $mainMod, D, exec, $launcher
bind = $mainMod SHIFT, D, exec, $powermenu
bind = $mainMod CTRL, D, exec, $windowMenu
bind = $mainMod ALT, D, global, quickshell:app_launcher

# Quickshell global shortcuts
bind = $mainMod SHIFT, V, global, quickshell:clipboard_history
bind = $mainMod, F1, global, quickshell:keybinds_help
bind = , Print, global, quickshell:take_screenshot

# Window management
bind = $mainMod, Q, killactive,
bind = $mainMod, M, exit,
bind = $mainMod, V, togglefloating,
bind = $mainMod, P, pseudo,      # dwindle
bind = $mainMod, J, togglesplit, # dwindle
bind = $mainMod alt,Tab,cyclenext,
bind = $mainMod, Tab, workspace, prev
# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Switch workspaces with mainMod + [0-7]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7

# Move active window to a workspace with mainMod + SHIFT + [0-7]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7

# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# ----- System ----- #

# Lock screen
bind = $mainMod, L, exec, ~/.config/hypr/scripts/system/lock.sh

# Speech-to-Text (Dictado por voz)
bind = $mainMod ALT, V, exec, ~/.config/hypr/scripts/system/transcribirAudio/stt.sh

# Screenshot (hyprshot)
bind = , PRINT, exec, hyprshot -m output
bind = $mainMod, PRINT, exec, hyprshot -m window
bind = $shiftMod, PRINT, exec, hyprshot -m region

# Waybar restart
#bind = $mainMod SHIFT, R, exec, ~/.config/waybar/waybar.sh

# Clipboard
bind = $mainMod ALT, C, exec, wl-paste | xargs -I {} $code {}

# Volume and brightness control
bindel = , XF86AudioRaiseVolume, global, quickshell:volume_up
bindel = , XF86AudioLowerVolume, global, quickshell:volume_down
bindel = , XF86AudioMute, global, quickshell:volume_mute
bindel = , XF86MonBrightnessUp, global, quickshell:brightness_up
bindel = , XF86MonBrightnessDown, global, quickshell:brightness_down

# Wallpaper controls
bind = $mainMod SHIFT, W, exec, ~/.config/hypr/scripts/tools/wallpaper-control.sh change && notify-send "Wallpaper changed"
bind = $mainMod CTRL, W, exec, ~/.config/hypr/scripts/tools/wallpaper-control.sh restart && notify-send "Wallpaper daemon restarted"
bind = $mainMod ALT, W, exec, ~/.config/hypr/scripts/tools/wallpaper-control.sh status && notify-send "Wallpaper daemon status"

# Theme controls
bind = $mainMod SHIFT, T, exec, ~/.config/hypr/scripts/system/theme-selector.sh select
bind = $mainMod CTRL, T, exec, ~/.config/hypr/scripts/system/theme-unifier.sh apply && notify-send "Themes unified"
bind = $mainMod SHIFT, C, exec, ~/.config/hypr/scripts/system/cursor-selector.sh select
bind = $mainMod CTRL, C, exec, ~/.config/hypr/scripts/system/cursor-fix.sh fix && notify-send "Cursor fixed"

# Gaming mode controls
bind = $mainMod SHIFT, G, exec, ~/.config/hypr/scripts/system/gaming-mode.sh on && notify-send "Gaming Mode" "Modo gaming activado"
bind = $mainMod CTRL, G, exec, ~/.config/hypr/scripts/system/gaming-mode.sh off && notify-send "Gaming Mode" "Modo gaming desactivado"
bind = $mainMod ALT, G, exec, ~/.config/hypr/scripts/system/gaming-mode.sh status && notify-send "Gaming Mode" "$(~/.config/hypr/scripts/system/gaming-mode.sh status | head -1)"

# Enhanced functionality keybindings
bind = $mainMod SHIFT, M, exec, ~/.config/hypr/scripts/tools/monitor-manager.sh
bind = $mainMod SHIFT, P, exec, ~/.config/hypr/scripts/tools/profile-manager.sh work
bind = $mainMod SHIFT, O, exec, ~/.config/hypr/scripts/tools/workspace-manager.sh organize
bind = $mainMod SHIFT, H, exec, ~/.config/hypr/scripts/system/health-monitor.sh && notify-send "Health Check" "System health logged"
