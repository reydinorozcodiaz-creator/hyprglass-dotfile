# Launch applications
bind = $mainMod, Return, exec, $terminal
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, R, exec, $menu
bind = $mainMod, C, exec, $code
bind = $mainMod, B, exec, $browser

# Rofi menus (consistent Super + D chords)
bind = $mainMod, D, exec, $launcher
bind = $mainMod SHIFT, D, exec, $powermenu
bind = $mainMod ALT, D, global, quickshell:app_launcher

# Quickshell global shortcuts
bind = $mainMod SHIFT, V, global, quickshell:clipboard_history
bind = $mainMod, F1, global, quickshell:keybinds_help
bind = , Print, global, quickshell:take_screenshot
bind = $mainMod, W, global, quickshell:wallpaper_picker


# Window management
bind = $mainMod, Q, killactive,
bind = $mainMod, M, exit,
bind = $mainMod, V, togglefloating,
bind = $mainMod, P, pseudo,      # dwindle
bind = $mainMod, J, togglesplit, # dwindle
bind = $mainMod alt,Tab,cyclenext,
bind = $mainMod, Tab, workspace, prev
# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d
bind = $mainMod, F, fullscreen,0
# Switch workspaces with mainMod + [0-7]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7

# Move active window to a workspace with mainMod + SHIFT + [0-7]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7

# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# ----- System ----- #

# Lock screen
bind = $mainMod, L, exec, $lockCmd

# Speech-to-Text (Dictado por voz)
bind = $mainMod ALT, V, exec, $sttCmd

# Clipboard
bind = $mainMod ALT, C, exec, wl-paste | xargs -I {} $code {}

# Volume and brightness control
bindel = , XF86AudioRaiseVolume, global, quickshell:volume_up
bindel = , XF86AudioLowerVolume, global, quickshell:volume_down
bindel = , XF86AudioMute, global, quickshell:volume_mute
bindel = , XF86MonBrightnessUp, global, quickshell:brightness_up
bindel = , XF86MonBrightnessDown, global, quickshell:brightness_down

# Wallpaper controls
bind = $mainMod SHIFT, W, exec, $wallpaperControl change
bind = $mainMod ALT, W, exec, $wallpaperControl status

# Theme controls
bind = $mainMod SHIFT, T, exec, $themeManager select
bind = $mainMod CTRL, T, exec, $themeManager apply
bind = $mainMod SHIFT, C, exec, $themeManager cursor
