# Environment Variables




# Qt/GTK Theme Configuration
# QT_QPA_PLATFORMTHEME y QT_STYLE_OVERRIDE los gestiona theme-unifier.sh
# → config/10-theme-unifier-env.conf (regenerado en cada login)
env = QT_QPA_PLATFORM,wayland
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = QT_AUTO_SCREEN_SCALE_FACTOR,1



# GTK Theme Configuration
env = GDK_BACKEND,wayland,x11
env = GTK_USE_PORTAL,1

# XDG
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland
env = XDG_MENU_PREFIX,arch-linux
env = WAYLAND_DISPLAY,wayland-1

envd = HYPRCURSOR_SIZE,24
envd = XCURSOR_SIZE,24
envd = QT_CURSOR_SIZE,24

# Cursor theme configuration
# XCURSOR_THEME la gestiona theme-unifier.sh → config/10-theme-unifier-env.conf
env = HYPRCURSOR_THEME,Sweet-cursors
env = QT_CURSOR_THEME,Sweet-cursors



# Forzamos a las aplicaciones SDL a usar el backend de Wayland
env = SDL_VIDEODRIVER,wayland

# Aplicaciones específicas para Wayland
env = MOZ_ENABLE_WAYLAND,1
env = CLUTTER_BACKEND,wayland
env = BEMENU_BACKEND,wayland

# Optimización de rendimiento
env = __GL_SHADER_DISK_CACHE,1
env = __GL_SHADER_DISK_CACHE_PATH,~/.cache/gl-shaders
env = FC_FONTATIONS,0
