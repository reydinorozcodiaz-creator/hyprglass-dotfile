# ============================================================================
# Shared window behavior rules
# ============================================================================

# Special windows
windowrule {
    name = XwaylandConfig
    match:class = xwaylandvideobridge
    no_anim = on
    no_blur = on
    no_focus = on
    no_initial_focus = on
    opacity = 0.0
    max_size = 1 1
}

windowrule {
    name = Eww Widgets
    match:class = Eww
    match:title = eww.*
    opacity = 0.8
    float = on
    no_focus = on
}

windowrule {
    name = Scrcpy
    match:class = scrcpy
    float = on
}

# Dialogs and portals
windowrule {
    name = File Managers
    match:class = file-roller|org\.gnome\.Nautilus|org\.kde\.dolphin|dolphin|Nemo|nemo|thunar
    float = on
    maximize = off
}

windowrule {
    name = File Dialogs EN
    match:title = ^(Save As|Open|Open File|Open Folder|Save File|File Upload|File Download|Choose File|Select a File|Select Files|Select Folder).*
    float = on
    size = (monitor_w*0.7) (monitor_h*0.8)
}

windowrule {
    name = File Dialogs ES
    match:title = ^(Guardar como|Abrir|Abrir archivo|Abrir carpeta|Guardar archivo|Subir archivo|Descargar archivo|Elegir archivo|Seleccionar un archivo|Seleccionar archivos|Seleccionar carpeta|Elegir archivos|Añadir un juego nuevo|Extraer|Carga de archivos|Añadir juegos a Lutris|Escoger archivo ROM|Renombrar|Escoger carpeta|Escoger archivo|Agregar carpeta al área de trabajo).*
    float = on
    size = (monitor_w*0.7) (monitor_h*0.8)
}

windowrule {
    name = Settings Dialogs EN
    match:title = ^(Settings|Preferences|Options).*
    float = on
    size = (monitor_w*0.6) (monitor_h*0.7)
}

windowrule {
    name = Settings Dialogs ES
    match:title = ^(Configuración|Preferencias|Opciones).*
    float = on
    size = (monitor_w*0.6) (monitor_h*0.7)
}

windowrule {
    name = File Progress
    match:class = Progreso de las operaciones de archivo
    float = on
    size = (monitor_w*0.5) (monitor_h*0.3)
}

windowrule {
    name = XDG Desktop Portal
    match:class = (xdg-desktop-portal|xdg-desktop-portal-gtk|xdg-desktop-portal-kde)
    float = on
    size = (monitor_w*0.7) (monitor_h*0.8)
}

windowrule {
    name = KDE Dialogs
    match:class = kdialog|org\.kde\.kdialog
    float = on
    size = (monitor_w*0.6) (monitor_h*0.7)
}

# System utilities
windowrule {
    name = Polkit Authentication
    match:class = ^(polkit-gnome-authentication-agent-1|hyprpolkitagent|org\.kde\.polkit-kde-authentication-agent-1|org\.org\.kde\.polkit-kde-authentication-agent-1).*$
    float = on
    size = (monitor_w*0.6) (monitor_h*0.7)
}

windowrule {
    name = Audio Control
    match:class = ^(pavucontrol|org\.pulseaudio\.pavucontrol)$
    float = on
    size = (monitor_w*0.5) (monitor_h*0.6)
}

windowrule {
    name = Bluetooth Settings
    match:class = ^(blueman-manager|org\.blueman\.blueman-manager)$
    float = on
    size = (monitor_w*0.5) (monitor_h*0.6)
}

windowrule {
    name = Network Manager
    match:class = ^(nm-connection-editor|org\.gnome\.NetworkManager\.Editor|org\.kde\.nm-connection-editor)$
    float = on
    size = (monitor_w*0.5) (monitor_h*0.6)
}

windowrule {
    name = Theme Settings
    match:class = ^(lxappearance|org\.gnome\.Appearance|nwg-look|qt5ct|qt6ct)$
    float = on
    size = (monitor_w*0.5) (monitor_h*0.6)
}

windowrule {
    name = Notifications
    match:class = mako|dunst|swaync|notification-daemon|swaync-notification-window|swaync-control-center
    no_focus = on
    no_initial_focus = on
    opacity = 0.90
}

windowrule {
    name = Package Managers
    match:class = ^(pamac-manager|org\.gnome\.Software|org\.kde\.discover|discover|synaptic)$
    float = on
    maximize = off
}

windowrule {
    name = System Tools
    match:class = org\.gnome\.DiskUtility|GParted
    float = on
}

windowrule {
    name = Image Viewers
    match:class = ^(eog|org\.gnome\.eog|gwenview|org\.kde\.gwenview|feh|sxiv)$
    float = on
    maximize = off
}

# Application behavior
windowrule {
    name = Games No Animations
    match:class = ^(steam|Steam|Lutris|lutris|heroic|Heroic|minetest|Minetest|minecraft-launcher|Minecraft Launcher|minecraft|Minecraft|pcsx2-qt|Yuzu|Cemu|net\.lutris\.Lutris)$
    no_anim = on
}

windowrule {
    name = Browsers
    match:class = ^(zen|firefox|Firefox|chromium|Chromium|google-chrome|Google-chrome|brave-browser|Brave-browser|org\.chromium\.Chromium|org\.mozilla\.firefox|Microsoft-edge|microsoft-edge)$
    maximize = off
    float = on
    size = (monitor_w*0.8) (monitor_h*0.9)
}

windowrule {
    name = Telegram
    match:class = ^(TelegramDesktop|telegram-desktop|org\.telegram\.desktop)$
    float = on
    maximize = off
    size = (monitor_w*0.8) (monitor_h*0.9)
}

windowrule {
    name = Messaging Apps
    match:class = ^(discord|Discord|webcord|Webcord|Franz|franz|whatsapp-nativefier-d40211|whatsdesk|Slack|slack)$
    float = on
    maximize = off
    size = (monitor_w*0.8) (monitor_h*0.9)
}

windowrule {
    name = Productivity Apps
    match:class = ^(libreoffice|LibreOffice|libreoffice-writer|LibreOffice-writer|libreoffice-calc|LibreOffice-calc|libreoffice-impress|LibreOffice-impress|org\.libreoffice\.LibreOffice|org\.libreoffice\.libreoffice-writer|org\.libreoffice\.libreoffice-calc|org\.libreoffice\.libreoffice-impress|onlyoffice-desktopeditors|OnlyOffice-desktopeditors)$
    maximize = off
    float = on
    size = (monitor_w*0.8) (monitor_h*0.9)
}

windowrule {
    name = Terminal Emulators
    match:class = ^(kitty|alacritty|Alacritty|gnome-terminal-server|Gnome-terminal-server|org\.gnome\.Terminal|konsole|Konsole|org\.kde\.konsole)$
    maximize = off
    float = on
    size = (monitor_w*0.8) (monitor_h*0.9)
}

windowrule {
    name = Game Translate
    match:class = ^(traductor-overlay|game-translate-overlay)$
    float = on
    no_blur = on
    no_shadow = on
    pin = on
    no_focus = on
    no_initial_focus = on
    opacity = 1
    move = 0 0
    size = 100% 100%
    animation = none
}

windowrule {
    name = Waydroid
    match:class = ^(waydroid|Waydroid)$
    float = on
}

windowrule {
    name = VS Code Opacity
    match:class = ^(code|Code|code-oss|Code-oss|org\.visualstudio\.Code)$
    opacity = 0.98
}
