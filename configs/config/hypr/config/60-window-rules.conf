# ============================================================================
# Hyprland Window Rules Configuration
# ============================================================================
# Sections:
# 1. Special Windows (xwaylandvideobridge, eww, etc.)
# 2. System Applications (File Managers, Dialogs, Settings)
# 3. Gaming Applications
# 4. Communication & Productivity
# 5. Development Tools
# 6. Workspace Assignments (Centralized)
# 7. Layer Rules
# 8. Global Rules
# ============================================================================

# ============================================================================
# 1. SPECIAL WINDOWS
# ============================================================================
# XWayland video bridge (for screen sharing)

windowrule{
    name = XwaylandConfig
    match:class = xwaylandvideobridge
    no_anim = on
    no_blur = on
    no_focus = on
    no_initial_focus = on
    opacity = 0.0
    max_size = 1 1
}

# Eww widgets
windowrule{
    name = eww
    match:class = Eww
    match:title = eww.*
    opacity = 0.8
    float = on
    no_focus = on

}

# Floating utilities

windowrule {
    name = utility
    match:class = scrcpy
    float = on
}

# ============================================================================
# 2. SYSTEM APPLICATIONS
# ============================================================================

# File Managers
windowrule {
    name =  File Manager
    match:class = file-roller|org.gnome.Nautilus|org.kde.dolphin | dolphin| Nemo|nemo| thunar
    
    float = on
    maximize = off

}

# --- System Dialogs & Portals ---

# Generic dialogs (English)
windowrule {
    name = File Dialogs
    match:title = ^(Save As|Open|Open File|Open Folder|Save File|File Upload|File Download|Choose File|Select a File|Select Files|Select Folder).*
    float = on
    
    size = (monitor_w*0.7) (monitor_h*0.8)
}

windowrule {
    name = Settings Dialogs
    match:title = ^(Settings|Preferences|Options).*
    float = on
    
    size = (monitor_w*0.6) (monitor_h*0.7)
}
# generic dialogs (spanish)
windowrule {
    name = File Dialogs ES
    match:title = ^(Guardar como|Abrir|Abrir archivo|Abrir carpeta|Guardar archivo|Subir archivo|Descargar archivo|Elegir archivo|Seleccionar un archivo|Seleccionar archivos|Seleccionar carpeta|Elegir archivos|Añadir un juego nuevo|Progreso de las operaciones de archivo|Extraer|Carga de archivos|Añadir juegos a Lutris|Escoger archivo ROM|Renombrar|Escoger carpeta|Escoger archivo).*
    float = on
    size = (monitor_w*0.7) (monitor_h*0.8)
}

# XDG Desktop Portals
windowrule {
    name = XDG Desktop Portal
    match:class = xdg-desktop-portal | xdg-desktop-portal-gtk | xdg-desktop-portal-kde
    float = on
    size = (monitor_w*0.7) (monitor_h*0.8)
}
# KDE dialogs
windowrule {
    name = KDE Dialogs
    match:class = kdialog|org.kde.kdialog
    float = on
    
    size = (monitor_w*0.6) (monitor_h*0.7)
}

# --- Authentication & System Settings ---
# Polkit Authentication
windowrule {
    name = Polkit Authentication
    match:class = ^(polkit-gnome-authentication-agent-1|hyprpolkitagent|org\.kde\.polkit-kde-authentication-agent-1|org\.org\.kde\.polkit-kde-authentication-agent-1).*$
    float = on
    
    size = (monitor_w*0.6) (monitor_h*0.7)
}
# Audio control
windowrule {
    name = Audio Control
    match:class = ^(pavucontrol|org\.pulseaudio\.pavucontrol)$
    float = on
    size = (monitor_w*0.5) (monitor_h*0.6)
}
# Bluetooth
windowrule {
    name = Bluetooth Settings
    match:class = ^(blueman-manager|org\.blueman\.blueman-manager)$
    float = on
    size = (monitor_w*0.5) (monitor_h*0.6)
}
# Network manager
windowrule {
    name = Network Manager
    match:class = ^(nm-connection-editor|org\.gnome\.NetworkManager\.Editor|org\.kde\.nm-connection-editor)$
    float = on
    size = (monitor_w*0.5) (monitor_h*0.6)
}

# Theme & appearance settings
windowrule {
    name = Theme Settings
    match:class = ^(lxappearance|org\.gnome\.Appearance|nwg-look|qt5ct)$
    float = on
    size = (monitor_w*0.5) (monitor_h*0.6)


}

# Notifications
windowrule {
    name = Notifications
    match:class = mako|dunst|swaync|notification-daemon|swaync-notification-window|swaync-control-center
    no_focus = on
    no_initial_focus = on
    opacity = 0.90
    }   

# Package managers
windowrule {
    name = Package Managers
    match:class = ^(pamac-manager|org\.gnome\.Software|org\.kde\.discover|discover|synaptic)$
    float = on
    maximize = off
}

# Misc system tools
windowrule {
    name = System Tools
    match:class = org.gnome.DiskUtility|GParted
    float = on

}

# --- Image viewers ---
windowrule {
    name = Image Viewer
    match:class = ^(eog|org\.gnome\.eog|gwenview|org\.kde\.gwenview|feh|sxiv)$
    float = on
    maximize = off
}

# ============================================================================
# 3. GAMING APPLICATIONS
# ============================================================================

# disable animations for games
windowrule {
    name = Games No Animations
    match:class = ^(steam|Steam|Lutris|lutris|heroic|Heroic|Obsidian|minetest|Minetest|minecraft-launcher|Minecraft Launcher|minecraft|Minecraft|pcsx2-qt|Yuzu|Cemu|net.lutris.Lutris)$
    no_anim = on
}




# ============================================================================
# 4. COMMUNICATION & PRODUCTIVITY
# ============================================================================

# --- Web Browsers ---
windowrule {
    name = Web Browsers
    match:class = ^(firefox|Firefox|chromium|Chromium|google-chrome|Google-chrome|brave-browser|Brave-browser|org\.chromium\.Chromium|org\.chromium\.Chromium|org\.mozilla\.firefox|Microsoft-edge|microsoft-edge)$
    maximize = off
    float = on
    size = (monitor_w*0.8) (monitor_h*0.9)
}
# Telegram

windowrule {
    name = Telegram
    match:class = ^(TelegramDesktop|telegram-desktop)$
    float = on
    maximize = off
    size = (monitor_w*0.8) (monitor_h*0.9)
}

# Discord,Webcord, etc.

windowrule {
    name = Discord
    match:class = ^(discord|Discord|webcord|Webcord|Franz|franz|whatsapp-nativefier-d40211|whatsdesk)$
    float = on
    maximize = off
    size = (monitor_w*0.8) (monitor_h*0.9)
}

# --- Productivity Apps ---

windowrule {
    name = Productivity Apps
    match:class = ^(libreoffice|LibreOffice|libreoffice-writer|LibreOffice-writer|libreoffice-calc|LibreOffice-calc|libreoffice-impress|LibreOffice-impress|org\.libreoffice\.LibreOffice|org\.libreoffice\.libreoffice-writer|org\.libreoffice\.libreoffice-calc|org\.libreoffice\.libreoffice-impress|onlyoffice-desktopeditors|OnlyOffice-desktopeditors)$
    maximize = off
    float = on
    size = (monitor_w*0.8) (monitor_h*0.9)
}

# ============================================================================
# 5. DEVELOPMENT TOOLS
# ============================================================================

# Terminal emulators
windowrule {
    name = Terminal Emulators
    match:class = ^(alacritty|Alacritty|gnome-terminal-server|Gnome-terminal-server|org\.gnome\.Terminal|konsole|Konsole|org\.kde\.konsole)$
    maximize = off
    float = on
    size = (monitor_w*0.8) (monitor_h*0.9)
}

# IDEs and Code Editors
windowrule {
    name = IDEs and Code Editors
    match:class = ^(code|Code|code-oss|Code-oss|org\.visualstudio\.Code|sublime_text|Sublime_text|org\.sublimetext\.Sublime_text|jetbrains-idea|Jetbrains-idea|jetbrains-clion|Jetbrains-clion)$

}
# Waydroid
windowrule {
    name = Waydroid
    match:class = ^(waydroid|Waydroid)$
    float = on
}

# ============================================================================
# 6. WORKSPACE ASSIGNMENTS (CENTRALIZED)
# ============================================================================
# This section centralizes ALL workspace assignments for better organization
# and easier maintenance.

# --- Workspace 1: Terminal Emulators ---
windowrule {
    name = Workspace 1 - Terminals
    match:class = ^(kitty|alacritty|Alacritty|gnome-terminal-server|Gnome-terminal-server|org\.gnome\.Terminal|konsole|Konsole|org\.kde\.konsole)$
    workspace = 1

}

# --- Workspace 2: Development (IDEs & Code Editors) ---
windowrule {
    name = Workspace 2 - Development
    match:class = ^(idea|code|Code|code-oss|Code-oss|org\.visualstudio\.Code|sublime_text|Sublime_text|org\.sublimetext\.Sublime_text|jetbrains-idea|Jetbrains-idea|jetbrains-clion|Jetbrains-clion)$
    workspace = 2
}
# --- Workspace 3: Web Browsers ---
windowrule {
    name = Workspace 3 - Browsers
    match:class = ^(zen|firefox|Firefox|chromium|Chromium|google-chrome|Google-chrome|brave-browser|Brave-browser|org\.chromium\.Chromium|org\.chromium\.Chromium|org\.mozilla\.firefox|Microsoft-edge|microsoft-edge)$
    workspace = 3
}
# --- Workspace 4: Communication Apps ---
windowrule {
    name = Workspace 4 - Communication
    match:class = ^(TelegramDesktop|telegram-desktop|discord|Discord|webcord|Webcord|Franz|franz|whatsapp-nativefier-d40211|whatsdesk)$
    workspace = 4
}

# --- Workspace 5: Media & Productivity ---

windowrule {
    name = Workspace 5 - Media & Productivity
    match:class = ^(libreoffice|LibreOffice|libreoffice-writer|LibreOffice-writer|libreoffice-calc|LibreOffice-calc|libreoffice-impress|LibreOffice-impress|org\.libreoffice\.LibreOffice|org\.libreoffice\.libreoffice-writer|org\.libreoffice\.libreoffice-calc|org\.libreoffice\.libreoffice-impress|onlyoffice-desktopeditors|OnlyOffice-desktopeditors|eog|gwenview|org.kde.gwenview|vlc|Spotify|spotify|mpv|okular|obsidian)$
    workspace = 5
}

# --- Workspace 6: System Utilities & Settings ---

windowrule {
    name = System Utilities - Workspace 6
    match:class = ^(pavucontrol|lxappearance|org\.gnome\.DiskUtility|GParted|org.pulseaudio.pavucontrol|blueman-manager|nm-connection-editor|fdm|org.kde.dolphin|dolphin|nemo|thunar|org.gnome.Nautilus|org.gnome.nautilus)$
    workspace = 6

}

# --- Workspace 7: Gaming ---

windowrule {
    name = Workspace 7 - Gaming
    match:class = ^(steam|Steam|Lutris|lutris|heroic|Heroic|Obsidian|minetest|Minetest|minecraft-launcher|Minecraft Launcher|minecraft|Minecraft|pcsx2-qt|Yuzu|Cemu|net.lutris.Lutris)$
    workspace = 7
}

# ============================================================================
# 7. LAYER RULES
# ============================================================================

# Rofi launcher
layerrule = blur on, match:namespace rofi|dunst|swaync
layerrule = ignore_alpha 0.0, match:namespace rofi|dunst|swaync
layerrule = dim_around on, match:namespace rofi|dunst|swaync
layerrule = animation popin, match:namespace rofi|dunst|swaync

# ============================================================================
# 8. GLOBAL RULES
# ============================================================================

windowrule {
    name = Global No Initial Focus
    match:class = .*
    suppress_event = maximize
}
