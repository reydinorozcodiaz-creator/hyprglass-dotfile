# Wayland Translate Rules
# Automatically loaded by Hyprland if included in source

windowrulev2 = float,title:^(wayland-translate-setup)$
windowrulev2 = float,title:^(wayland-translate-overlay)$

# While setting up (unlocked), allow input
windowrulev2 = noblur,title:^(wayland-translate-setup)$

# When locked (overlay mode), ignore input (click-through handled by app)
# windowrulev2 = noinput,title:^(wayland-translate-overlay)$  <-- REMOVED (Invalid/Deprecated)
windowrulev2 = noblur,title:^(wayland-translate-overlay)$
windowrulev2 = noshadow,title:^(wayland-translate-overlay)$
windowrulev2 = pin,title:^(wayland-translate-overlay)$
windowrulev2 = noborder,title:^(wayland-translate-overlay)$
