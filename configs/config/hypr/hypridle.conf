general {
     lock_cmd = pidof hyprlock || ~/.config/hypr/scripts/system/lock.sh
     before_sleep_cmd = ~/.config/hypr/scripts/system/lock.sh
     after_sleep_cmd = hyprctl dispatch dpms on
 }

 # Bloquear pantalla después de 5 minutos de inactividad
 listener {
     timeout = 300
     on-timeout = ~/.config/hypr/scripts/system/lock.sh
 }

 # Apagar pantalla después de 10 minutos de inactividad
 listener {
     timeout = 600
     on-timeout = hyprctl dispatch dpms off
     on-resume = hyprctl dispatch dpms on
 }

 # Suspensión después de 2 horas (solo para laptops)
 listener {
     timeout = 7200
     on-timeout = systemctl suspend
 }
