general {
     lock_cmd = pidof hyprlock || ~/.config/hypr/scripts/system/lock.sh
     before_sleep_cmd = ~/.config/hypr/scripts/system/lock.sh
     after_sleep_cmd = hyprctl dispatch dpms on
     ignore_dbus_inhibit = false
 }

 # Listener 1: Bloquear pantalla después de 1 hora de inactividad
 listener {
     timeout = 3600
     on-timeout = ~/.config/hypr/scripts/system/lock.sh
     on-resume = hyprctl dispatch dpms on
 }

 # Listener 2: Apagar pantalla después de 1 hora 5 minutos de inactividad
 listener {
     timeout = 3900
     on-timeout = hyprctl dispatch dpms off
     on-resume = hyprctl dispatch dpms on
 }

 # Listener 3: Suspensión después de 2 horas de inactividad
 listener {
     timeout = 7200
     on-timeout = systemctl suspend
     on-resume = hyprctl dispatch dpms on
 }
