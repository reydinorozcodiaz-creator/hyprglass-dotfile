# ==========================================
# ★ KITTY CONFIGURATION FILE ★
# ==========================================

# ------------------------------------------
# Includes & General
# ------------------------------------------
include color.ini
enable_audio_bell yes
update_check_interval 24
confirm_os_window_close 0

# ------------------------------------------
# Fonts
# ------------------------------------------
font_family      CaskaydiaCove Nerd Font
font_size        14.0
disable_ligatures never

# ------------------------------------------
# Cursor
# ------------------------------------------
cursor_shape beam
cursor_beam_thickness 1.8
cursor_blink_interval 0.5
cursor_stop_blinking_after 15.0
default_pointer_shape beam

# ------------------------------------------
# Window & Layouts
# ------------------------------------------
window_padding_width 15
placement_strategy center
background_opacity 0.70

# Habilitamos los layouts de splits (paneles) y stack (zoom)
enabled_layouts splits,stack

# ------------------------------------------
# Tab Bar (Pestañas)
# ------------------------------------------
tab_bar_style powerline
# Estilos del powerline: angled, slanted, o round. "slanted" se ve muy moderno.
tab_powerline_style slanted 
tab_title_template "{index}: {title}"

# ------------------------------------------
# URLs / Interaction
# ------------------------------------------
url_color #0087bd
url_style curly
detect_urls yes
mouse_hide_wait 3.0
copy_on_select no

# ------------------------------------------
# Performance (Valores por defecto óptimos)
# ------------------------------------------
repaint_delay 10
input_delay 3
sync_to_monitor yes

# ------------------------------------------
# Shell
# ------------------------------------------
shell zsh
shell_integration enabled
scrollback_lines 10000

# ==========================================
# ★ KEYBINDINGS (ATAJOS DE TECLADO) ★
# ==========================================

# --- Portapapeles (Clipboard) ---
# Kitty ya usa ctrl+shift+c y ctrl+shift+v por defecto. Si quieres 
# buffers específicos puedes usar F1 para copiar y F2 para pegar:
map f1 copy_to_buffer a
map f2 paste_from_buffer a

# --- Gestión de Pestañas (Tabs) ---
map ctrl+shift+t new_tab_with_cwd
map ctrl+shift+enter new_window_with_cwd

# --- Gestión de Ventanas (Splits) ---
map ctrl+alt+enter launch --location=vsplit
map ctrl+alt+shift+enter launch --location=hsplit

# --- Navegación entre Pestañas ---
map ctrl+left previous_tab
map ctrl+right next_tab

# --- Navegación entre Paneles ---
map ctrl+alt+left neighboring_window left
map ctrl+alt+right neighboring_window right
map ctrl+alt+up neighboring_window up
map ctrl+alt+down neighboring_window down

# --- Redimensionar Paneles (Splits) ---
map ctrl+shift+left resize_window narrower
map ctrl+shift+right resize_window wider
map ctrl+shift+up resize_window taller
map ctrl+shift+down resize_window shorter


# --- Gestión del Layout ---
# Alternar al layout "stack" (hace un "zoom" al panel actual ocultando los demás)
map ctrl+shift+z toggle_layout stack
